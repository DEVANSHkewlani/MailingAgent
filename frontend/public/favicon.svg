<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0d0d0e" rx="96"/>
  
  <!-- Outer Wireframe Base Ellipse -->
  <ellipse cx="256" cy="380" rx="150" ry="45" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
  
  <!-- Intermediate Division Ellipses (Grid Rings) -->
  <ellipse cx="256" cy="300" rx="100" ry="30" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="256" cy="220" rx="50" ry="15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Vertices Lines (Grid Meridians) -->
  <line x1="256" y1="120" x2="256" y2="425" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="106" y2="380" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="406" y2="380" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="150" y2="410" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="362" y2="410" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="150" y2="350" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="120" x2="362" y2="350" stroke="#ffffff" stroke-width="2" opacity="0.8"/>

  <!-- Back Grid Lines -->
  <path d="M106,380 A150,45 0 0,1 406,380" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Nodes (Dots) at Vertices -->
  <circle cx="256" cy="120" r="8" fill="#ffffff"/>
  <circle cx="256" cy="425" r="6" fill="#ffffff"/>
  <circle cx="106" cy="380" r="6" fill="#ffffff"/>
  <circle cx="406" cy="380" r="6" fill="#ffffff"/>
  <circle cx="150" cy="410" r="6" fill="#ffffff"/>
  <circle cx="362" cy="410" r="6" fill="#ffffff"/>
  <circle cx="150" cy="350" r="6" fill="#ffffff"/>
  <circle cx="362" cy="350" r="6" fill="#ffffff"/>
</svg>